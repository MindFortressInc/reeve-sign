name: Publish Reeve.Sign image (GHCR)

# Reeve.Sign fork build pipeline. Adapted from upstream Documenso's publish.yml:
# - publishes ONLY to GitHub Container Registry (no DockerHub),
# - builds a single native arm64 image (the reeve-ec2 deploy host is aarch64),
# - runs on a GitHub-hosted arm64 runner (free for public repos),
# - authenticates with the built-in GITHUB_TOKEN.
# Trigger manually: `gh workflow run publish.yml --ref <branch> -f tag=<tag>`.
#
# The GHCR package visibility is private (configured separately from the public repo);
# the reeve-ec2 host has no read:packages credential.
# The `export_tarball` mode pulls the already-published image inside CI (where
# GITHUB_TOKEN can read same-org packages) and uploads it as a downloadable
# artifact, so the image can be `docker load`ed onto the host without a registry
# login. Trigger: `gh workflow run publish.yml --ref <branch> -f export_tarball=true`.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Moving image tag to publish (e.g. dev). An immutable sha-<shortsha> tag is always also pushed.'
        required: false
        default: 'dev'
        type: string
      export_tarball:
        description: 'Skip the build and export the existing :tag image as a downloadable tarball artifact instead.'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build_and_publish:
    name: Build and publish reeve-sign image (arm64)
    if: ${{ ! inputs.export_tarball }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push the image
        env:
          IMAGE: ghcr.io/mindfortressinc/reeve-sign
          TAG: ${{ inputs.tag || 'dev' }}
        run: |
          set -euo pipefail
          GIT_SHA="$(git rev-parse --short HEAD)"

          docker build \
            -f ./docker/Dockerfile \
            --progress=plain \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:sha-${GIT_SHA}" \
            .

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:sha-${GIT_SHA}"

          echo "Published ${IMAGE}:${TAG} and ${IMAGE}:sha-${GIT_SHA}"

  export_tarball:
    name: Export reeve-sign image as a tarball artifact (arm64)
    if: ${{ inputs.export_tarball }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, save and compress the image
        env:
          IMAGE: ghcr.io/mindfortressinc/reeve-sign
          TAG: ${{ inputs.tag || 'dev' }}
        run: |
          set -euo pipefail
          docker pull "${IMAGE}:${TAG}"
          docker save "${IMAGE}:${TAG}" | gzip > reeve-sign-image.tar.gz
          ls -lh reeve-sign-image.tar.gz

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: reeve-sign-image
          path: reeve-sign-image.tar.gz
          retention-days: 1
